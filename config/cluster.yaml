# ============================================================
# config/cluster.yaml — SGE ジョブごとのリソース設定
#
# pipeline.sh 内の qsub コマンドに渡されるオプション。
# 共通オプション (-cwd -o logs/ -e logs/) は pipeline.sh 側で付与。
# ジョブごとに異なるCPU/メモリのみここに書く。
#
# ルール名は Snakefile の rule 名と一致させること。
# ============================================================

# --- デフォルト (どのルールにも一致しない場合) ---
__default__:
  options: >-
    -pe smp 1
    -l mem=8G

# ============================================================
# Step 0: サンプルフィルタリング — 軽量
# ============================================================
filter_samples:
  options: >-
    -pe smp 1
    -l mem=4G

# ============================================================
# Step 1: Prokka — CPUヘビー
# ============================================================
run_prokka:
  options: >-
    -pe smp 8
    -l mem=16G

# ============================================================
# Step 2: KoFamScan — CPUヘビー (並列対応)
# ============================================================
run_kofamscan:
  options: >-
    -pe smp 8
    -l mem=16G

# ============================================================
# Step 3: KoFamScan → CSV — 軽量
# ============================================================
kofamscan_to_csv:
  options: >-
    -pe smp 1
    -l mem=4G

# ============================================================
# Step 4: KO profile 作成 — メモリ中程度 (全サンプル集約)
# ============================================================
make_ko_profile:
  options: >-
    -pe smp 1
    -l mem=16G

# ============================================================
# Step 5: Lasso / Ridge / Random Forest 学習 — CPUヘビー
# ============================================================
bench_models:
  options: >-
    -pe smp 16
    -l mem=64G

# ============================================================
# Step 6: 可視化 — 軽量
# ============================================================
visualize:
  options: >-
    -pe smp 1
    -l mem=8G
